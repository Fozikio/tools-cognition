version: 2
updates:
  # npm dependencies — picks up hono fixes transitively via @fozikio/cortex-engine
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      fozikio:
        patterns:
          - "@fozikio/*"
      dev-dependencies:
        dependency-type: "development"

  # Keep GitHub Actions in workflows patched
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
